name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Keep this specifier identical to the `dev` extra in pyproject.toml,
      # or the lint job and a local dev install can resolve different black
      # majors and disagree on formatting.
      - run: pip install ruff "black>=23.9.0,<26"
      - name: Ruff lint
        run: ruff check src tests
      - name: Black format check
        run: black --check src tests

  # The type gate lives here, not in the runtime matrix. mypy is a STATIC
  # check: running it once per supported runtime tells you nothing extra, and
  # a range there is what let three environments disagree about its verdict.
  # One pinned interpreter gives one deterministic answer.
  types:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "."
      # EXACT pins: a range is what let three environments disagree about this
      # gate's verdict once already. These are the versions the green run
      # 29682008787 used.
      - run: pip install "mypy==2.3.0" "types-requests==2.33.0.20260712"
      - name: Show pinned type-check versions
        run: |
          python -m mypy --version
          python -m pip show types-requests | head -2
      - name: Type check (required, whole production tree)
        run: mypy src/megabasterd_cli --ignore-missing-imports
