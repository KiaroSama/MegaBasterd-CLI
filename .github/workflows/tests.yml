name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check src tests

      - name: Show pinned type-check versions
        # Printed before the gate runs so a future divergence is visible in the
        # log instead of showing up as an unexplained red build.
        run: |
          python -m mypy --version
          python -m pip show types-requests | head -2

      - name: Type check (required, whole production tree)
        # Every production module, not an allowlist. The allowlist form meant
        # the heaviest files - downloader, uploader, crypter, hashcash, proxy,
        # streaming - were covered only by an advisory run that could not fail
        # the build, which is the same as not being covered.
        run: mypy src/megabasterd_cli --ignore-missing-imports


      - name: Run tests
        # Coverage baseline is ~61%; fail the build if local coverage regresses
        # below 55% (Codecov upload stays non-fatal for network failures).
        run: pytest --cov=megabasterd_cli --cov-report=xml --cov-fail-under=76

      - name: Smoke-test script launcher
        shell: pwsh
        run: ./Run.ps1 --help

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
