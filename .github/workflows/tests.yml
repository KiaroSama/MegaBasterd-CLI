name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"


      - name: Run tests
        # -n auto comes from addopts in pyproject.toml, so a local run and this
        # job fan out the same way. Coverage is currently ~78%; the gate is 76.
        run: pytest --cov=megabasterd_cli --cov-report=xml --cov-fail-under=76

      - name: Smoke-test script launcher
        shell: pwsh
        run: ./Run.ps1 --help

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
